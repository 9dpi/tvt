<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TVT — Tesla Visual Thinking</title>
  <meta name="description" content="Hệ thống tư duy có cấu trúc · Phong cách Tesla · Offline-first">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="css/tvt.css">
</head>
<body>

<div class="xp-window" id="main-window">

  <!-- Title Bar -->
  <div class="xp-titlebar" id="titlebar">
    <span class="xp-title-icon">⚡</span>
    <span class="xp-title-text" id="window-title">TVT : Bạn — Phiên tư duy</span>
    <div class="xp-controls">
      <button class="xp-btn close" id="btn-close" title="Khởi động lại trang" onclick="location.reload()">✕</button>
    </div>
  </div>

  <!-- Body Split -->
  <div class="xp-body-split">
    
    <!-- === LEFT PANEL : CHAT (Scroll fixed inside) === -->
    <div class="xp-chat-panel">
      <!-- Chat header -->
      <div class="chat-header">
        <div class="chat-avatar">⚡</div>
        <div class="chat-header-info">
          <div class="chat-header-name">Tesla Visual Thinking</div>
          <div class="chat-header-sub provider-label">AI đang kiểm tra...</div>
        </div>
        <div class="chat-toolbar">
          <button class="chat-tool-btn" id="btn-download-json" title="Tải JSON session hiện tại">💾</button>
          <button class="chat-tool-btn" id="btn-download-md" title="Tải Markdown session hiện tại">📄</button>
        </div>
      </div>

      <div class="xp-divider"></div>

      <!-- Messages area: Fixed height, isolated scrolling -->
      <div class="chat-messages-wrapper">
        <div id="chat-messages">
          <!-- Messages will be injected here -->
        </div>
      </div>

      <!-- Input area -->
      <div class="chat-input-area">
        <div class="input-hint-row">
          <span id="input-hint"></span>
        </div>
        <textarea id="msg-input" placeholder="Nhập câu trả lời..." rows="3"></textarea>
        <div class="chat-bottom-bar">
          <label class="sound-label">
            <input type="checkbox" id="sound-check"> Sound
          </label>
          <button id="send-btn" type="button">
            <span class="send-icon">📤</span>
            <span>Send</span>
          </button>
        </div>
      </div>
    </div> <!-- end xp-chat-panel -->

    <!-- === RIGHT PANEL : WINDOWS XP TASK PANE === -->
    <div class="xp-side-panel">
      
      <!-- 1. AI Status & Settings -->
      <div class="xp-group">
        <div class="xp-group-header">⚙️ Cài đặt & Trạng thái AI</div>
        <div class="xp-group-body">
          <div class="ai-status-row">
            <div class="status-dot checking" id="ai-status-dot"></div>
            <span id="ai-status-text">Đang tìm AI...</span>
          </div>
          <div class="xp-settings-mini">
            <input class="settings-input" id="cfg-gemini-key" type="password" placeholder="Gemini API Key...">
            <input class="settings-input" id="cfg-groq-key" type="password" placeholder="Groq API Key...">
            <button class="xp-action-btn" id="btn-save-settings">Lưu Token</button>
          </div>
        </div>
      </div>

      <!-- 2. Models -->
      <div class="xp-group">
        <div class="xp-group-header">📋 Chọn phương pháp tư duy</div>
        <div class="xp-group-body" id="model-list">
          <!-- Models injected here -->
        </div>
      </div>

      <!-- 3. History -->
      <div class="xp-group" style="flex: 1;">
        <div class="xp-group-header">📂 Lịch sử phiên</div>
        <div class="xp-group-body" style="flex: 1; overflow-y: auto; padding: 4px;" id="history-list">
          <!-- History injected here -->
        </div>
      </div>

    </div> <!-- end xp-side-panel -->

  </div> <!-- end xp-body-split -->
</div>

<div id="toast"></div>

<script src="js/models.js"></script>
<script src="js/ai-providers.js"></script>
<script src="js/tvt-core.js"></script>
<script src="js/app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
  }
</script>

</body>
</html>
