<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TALKING WITH NIKOLA — TVT Community</title>
  <meta name="description" content="Hệ thống tư duy cộng đồng mở · Phong cách Tesla · Offline-first · Không phụ thuộc AI">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="css/tvt.css">
  <link rel="stylesheet" href="css/community.css">
</head>
<body>

<div class="xp-window" id="main-window">

  <!-- Title Bar -->
  <div class="xp-titlebar" id="titlebar">
    <span class="xp-title-icon">⚡</span>
    <span class="xp-title-text" id="window-title">TESLA VISUAL THINKING — Cộng đồng Tư Duy</span>
    <div class="xp-controls">
      <button class="xp-btn close" id="btn-close" title="Khởi động lại trang" onclick="location.reload()">✕</button>
    </div>
  </div>

  <!-- Body Split: 3 columns -->
  <div class="xp-body-split">

    <!-- ===  COMMUNITY PANEL (LEFT) === -->
    <div class="xp-community-panel" id="community-panel">

      <!-- Community Header -->
      <div class="comm-panel-header">
        <div class="comm-panel-title">
          <span class="comm-panel-icon">🌐</span>
          <span>Cộng đồng</span>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="comm-toolbar">
        <button class="comm-tool-btn comm-tool-btn--primary" id="comm-btn-new" title="Đặt câu hỏi mới">
          ✏️ Đặt câu hỏi
        </button>
        <div class="comm-toolbar-right">
          <button class="comm-tool-btn" id="comm-btn-export" title="Xuất dữ liệu để chia sẻ">📤</button>
          <button class="comm-tool-btn" id="comm-btn-import" title="Nhập dữ liệu từ cộng đồng khác">📥</button>
          <input type="file" id="comm-import-file" accept=".json" style="display:none">
        </div>
      </div>

      <!-- Search + Filter -->
      <div class="comm-search-row">
        <input type="text" id="comm-search" class="comm-search" placeholder="🔍 Tìm vấn đề...">
        <select id="comm-filter" class="comm-filter">
          <option value="all">Tất cả</option>
          <option value="open">Đang thảo luận</option>
          <option value="solved">Đã giải quyết</option>
        </select>
      </div>

      <!-- Community Feed -->
      <div id="community-feed" class="comm-feed">
        <!-- Cards injected by community.js -->
      </div>

    </div> <!-- end community panel -->

    <!-- === CHAT PANEL (CENTER) === -->
    <div class="xp-chat-panel">
      <!-- Chat header -->
      <div class="chat-header">
        <div class="chat-avatar">⚡</div>
        <div class="chat-header-info">
          <div class="chat-header-name">Tesla Visual Thinking</div>
          <div class="chat-header-sub provider-label">AI đang kiểm tra...</div>
        </div>
        <div class="chat-toolbar">
          <button class="chat-tool-btn mobile-menu-btn" id="btn-mobile-menu" title="Menu">☰ Menu</button>
          <button class="chat-tool-btn comm-toggle-btn" id="btn-comm-toggle" title="Cộng đồng">🌐</button>
          <button class="chat-tool-btn" id="btn-buzz" title="Buzz!">🔔 BUZZ!</button>
          <button class="chat-tool-btn" id="btn-new-chat" title="Tạo phiên mới">➕ Phiên mới</button>
          <button class="chat-tool-btn" id="btn-download-json" title="Tải JSON">💾</button>
          <button class="chat-tool-btn" id="btn-download-md" title="Tải báo cáo MD">📄</button>
        </div>
      </div>

      <div class="xp-divider"></div>

      <!-- Messages area -->
      <div class="chat-messages-wrapper">
        <div id="chat-messages">
          <!-- Messages will be injected here -->
        </div>
      </div>

      <div class="xp-progress-container" id="progress-box">
        <div class="xp-progress-label" id="progress-text">TVT đang xử lý...</div>
        <div class="xp-progress-track">
          <div class="xp-progress-fill" id="progress-bar"></div>
        </div>
      </div>

      <!-- Input area -->
      <div class="chat-input-area">
        <div class="input-hint-row">
          <span id="input-hint"></span>
        </div>
        <textarea id="msg-input" placeholder="Nhập câu trả lời..." rows="3"></textarea>
        <div class="chat-bottom-bar">
          <label class="sound-label">
            <input type="checkbox" id="sound-check"> Sound
          </label>
          <button id="send-btn" type="button">
            <span class="send-icon">📤</span>
            <span>Send</span>
          </button>
        </div>
      </div>
    </div> <!-- end xp-chat-panel -->

    <!-- === RIGHT PANEL : TASK PANE === -->
    <div class="xp-side-panel">
      
      <!-- 1. AI Status & Settings -->
      <div class="xp-group">
        <div class="xp-group-header">⚙️ Cài đặt &amp; Trạng thái AI</div>
        <div class="xp-group-body">
          <div class="ai-status-row">
            <div class="status-dot checking" id="ai-status-dot"></div>
            <span id="ai-status-text">Đang tìm AI...</span>
          </div>
          <div class="xp-settings-mini">
            <div style="font-size: 10px; color: #555; margin-bottom: 4px;">Tăng cường tính năng bằng AI Cloud (Tuỳ chọn):</div>
            <div style="position: relative;">
              <input class="settings-input" id="cfg-gemini-key" style="width: 100%;" type="password" placeholder="Mã Google Gemini...">
              <a href="https://aistudio.google.com/app/apikey" target="_blank" style="font-size: 9px; position: absolute; right: 2px; top: 3px; color: #0054E3; text-decoration: underline;" title="Lấy mã Gemini miễn phí">Lấy mã</a>
            </div>
            <div style="position: relative;">
              <input class="settings-input" id="cfg-groq-key" style="width: 100%;" type="password" placeholder="Mã mạng Groq...">
              <a href="https://console.groq.com/keys" target="_blank" style="font-size: 9px; position: absolute; right: 2px; top: 3px; color: #0054E3; text-decoration: underline;" title="Lấy mã Groq tốc độ cao">Lấy mã</a>
            </div>
            <div style="display: flex; gap: 4px; margin-top: 2px;">
              <button class="xp-action-btn" id="btn-save-settings" style="flex: 2;">💾 Lưu Token</button>
              <button class="xp-action-btn" id="btn-ai-help" style="flex: 1; padding: 2px;" title="Hướng dẫn lấy API">❓ Hướng dẫn</button>
            </div>
          </div>
        </div>
      </div>

      <!-- 2. Models -->
      <div class="xp-group">
        <div class="xp-group-header">📋 Chọn phương pháp tư duy</div>
        <div class="xp-group-body" id="model-list">
          <!-- Models injected here -->
        </div>
      </div>

      <!-- 3. History -->
      <div class="xp-group" style="flex: 1;">
        <div class="xp-group-header">📂 Lịch sử phiên</div>
        <div class="xp-group-body" style="flex: 1; overflow-y: auto; padding: 4px;" id="history-list">
          <!-- History injected here -->
        </div>
      </div>

    </div> <!-- end xp-side-panel -->

  </div> <!-- end xp-body-split -->
</div>

<div id="toast"></div>

<script src="js/models.js"></script>
<script src="js/ai-providers.js"></script>
<script src="js/tvt-core.js"></script>
<script src="js/app.js"></script>
<script src="js/community.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
  }

  // Init community panel after all modules load
  window.addEventListener('DOMContentLoaded', () => {
    CommunityUI.init();

    // Toggle community panel on mobile
    document.getElementById('btn-comm-toggle')?.addEventListener('click', () => {
      document.getElementById('community-panel')?.classList.toggle('comm-panel--visible');
    });
  });
</script>

</body>
</html>
